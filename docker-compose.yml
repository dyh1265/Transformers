services:
  train:
    build: .
    image: nano-llm-train
    command: ["python", "scripts/train.py"]
    shm_size: "1gb"
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=all

  generate:
    image: nano-llm-train
    build: .
    entrypoint: ["python", "scripts/generate.py"]
    volumes:
      - .:/workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
